apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-server
  namespace: pairly
spec:
  replicas: 3
  selector:
    matchLabels:
      app: websocket-server
  template:
    metadata:
      labels:
        app: websocket-server
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "waiting for postgres..."
                sleep 3
              done
              echo "postgres ready"

        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb 27017; do
                echo "waiting for mongodb..."
                sleep 3
              done
              echo "mongodb ready"

        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis..."
                sleep 3
              done
              echo "redis ready"

        # Uses the kafka image to actually verify broker is responding —
        # not just that the port is open. nc -z would return true as soon
        # as the port opens but before Kafka is ready to serve requests.
        - name: wait-for-kafka
          image: confluentinc/cp-kafka:7.6.0
          command:
            - sh
            - -c
            - |
              until kafka-broker-api-versions \
                --bootstrap-server kafka-0.kafka.pairly.svc.cluster.local:9092 \
                > /dev/null 2>&1; do
                echo "waiting for kafka to be ready..."
                sleep 5
              done
              echo "kafka ready"

      containers:
        - name: websocket-server
          image: nrubiano01/pairly-server:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: pairly-config
            - secretRef:
                name: pairly-secrets
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 2"]
      terminationGracePeriodSeconds: 30