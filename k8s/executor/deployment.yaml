apiVersion: apps/v1
kind: Deployment
metadata:
  name: executor
  namespace: pairly
spec:
  replicas: 2
  selector:
    matchLabels:
      app: executor
  template:
    metadata:
      labels:
        app: executor
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "waiting for postgres..."
                sleep 3
              done
              echo "postgres ready"

        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb 27017; do
                echo "waiting for mongodb..."
                sleep 3
              done
              echo "mongodb ready"

        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis..."
                sleep 3
              done
              echo "redis ready"

        - name: wait-for-kafka
          image: confluentinc/cp-kafka:7.6.0
          command:
            - sh
            - -c
            - |
              until kafka-broker-api-versions \
                --bootstrap-server kafka-0.kafka.pairly.svc.cluster.local:9092 \
                > /dev/null 2>&1; do
                echo "waiting for kafka to be ready..."
                sleep 5
              done
              echo "kafka ready"

      containers:
        - name: executor
          image: nrubiano01/pairly-executor:latest
          ports:
            - containerPort: 50051
            - containerPort: 2112
          envFrom:
            - configMapRef:
                name: pairly-config
            - secretRef:
                name: pairly-secrets
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 2"]
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: tmp
          hostPath:
            path: /tmp
            type: Directory
      terminationGracePeriodSeconds: 35