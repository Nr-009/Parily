apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: pairly
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'websocket-server'
        static_configs:
          - targets: ['websocket-server:8080']

      - job_name: 'executor'
        static_configs:
          - targets: ['executor:2112']