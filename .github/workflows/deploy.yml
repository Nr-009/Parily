name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ── Test + Lint ──────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend/go.sum

      - name: Run tests
        working-directory: backend
        run: go test ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: backend
          version: latest

  # ── Build + Push Images ──────────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test]
    # only push images on main — not on pull requests
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push websocket-server
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: nrubiano01/pairly-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push executor
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.executor
          push: true
          tags: nrubiano01/pairly-executor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: nrubiano01/pairly-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max