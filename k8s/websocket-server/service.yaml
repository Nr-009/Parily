apiVersion: v1
kind: Service
metadata:
  name: websocket-server
  namespace: pairly
spec:
  # LoadBalancer exposes the service externally via Minikube.
  # Run "minikube service websocket-server -n pairly" to get the URL.
  type: LoadBalancer
  selector:
    app: websocket-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080