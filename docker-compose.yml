services:
  postgres:
    image: postgres:16-alpine
    container_name: parily_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: parily_mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: parily_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: parily_kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      # KRaft mode — no ZooKeeper needed
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 720        # 30 days
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: false # we create topics explicitly
      CLUSTER_ID: "kOLkJIMhRqaooqzYDK7-yw"  # required for KRaft — fixed string
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s  # kafka takes longer to boot than other services

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: parily_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    # runs once, creates topics, then exits
    entrypoint: ["/bin/sh", "-c", "echo 'Creating Kafka topics...' && kafka-topics --create --bootstrap-server kafka:9092 --topic edit-events --partitions 1 --replication-factor 1 --config retention.ms=2592000000 && kafka-topics --create --bootstrap-server kafka:9092 --topic execution-events --partitions 1 --replication-factor 1 --config retention.ms=2592000000 && kafka-topics --create --bootstrap-server kafka:9092 --topic dead-letter --partitions 1 --replication-factor 1 --config retention.ms=7776000000 && echo 'Topics created.' && kafka-topics --list --bootstrap-server kafka:9092"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parily_backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT}:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: parily_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:5173"
    environment:
      - VITE_WS_URL=ws://localhost:${SERVER_PORT}
      - VITE_API_URL=http://localhost:${SERVER_PORT}
    depends_on:
      - backend

  executor:
    build:
      context: ./backend
      dockerfile: Dockerfile.executor
    container_name: parily_executor
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  kafka_data: